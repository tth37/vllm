# Config B: Private IPC — All GPUs visible + PRIVATE IPC + host network
# Hypothesis: CUDA IPC goes through NVIDIA kernel module, not POSIX IPC namespace.
#   If true, P2P transport still works despite private IPC namespace.
# Isolation: IPC namespace only

services:
  rank0:
    image: gpu-comm-benchmark:latest
    container_name: exp2-pripc-rank0
    runtime: nvidia
    network_mode: host
    # ipc: private (default — omitting ipc: host)
    pid: host
    environment:
      - NVIDIA_VISIBLE_DEVICES=0,1,2,3
      - CUDA_VISIBLE_DEVICES=0
      - NCCL_HOSTID=exp2-node
      - NCCL_DEBUG=INFO
      - NCCL_DEBUG_SUBSYS=INIT,P2P,SHM,NET
      - WORLD_SIZE=4
      - RANK=0
      - MASTER_ADDR=localhost
      - MASTER_PORT=29500
      - OUTPUT_FILE=/results/private_ipc_results.json
      - SMOKE_TEST=${SMOKE_TEST:-false}
    volumes:
      - ../benchmark.py:/workspace/benchmark.py
      - ../benchmark_docker.py:/workspace/benchmark_docker.py
      - ../results:/results
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0', '1', '2', '3']
              capabilities: [gpu]

  rank1:
    image: gpu-comm-benchmark:latest
    container_name: exp2-pripc-rank1
    runtime: nvidia
    network_mode: host
    pid: host
