# Config A: Baseline — All GPUs visible + host IPC + host network
# Expected: P2P/CUMEM transport (known good from exp1)
# Isolation: NONE

services:
  rank0:
    image: gpu-comm-benchmark:latest
    container_name: exp2-baseline-rank0
    runtime: nvidia
    network_mode: host
    ipc: host
    pid: host
    environment:
      - NVIDIA_VISIBLE_DEVICES=0,1,2,3
      - CUDA_VISIBLE_DEVICES=0
      - NCCL_HOSTID=exp2-node
      - NCCL_DEBUG=INFO
      - NCCL_DEBUG_SUBSYS=INIT,P2P,SHM,NET
      - WORLD_SIZE=4
      - RANK=0
      - MASTER_ADDR=localhost
      - MASTER_PORT=29500
      - OUTPUT_FILE=/results/baseline_results.json
      - SMOKE_TEST=${SMOKE_TEST:-false}
    volumes:
      - ../benchmark.py:/workspace/benchmark.py
      - ../benchmark_docker.py:/workspace/benchmark_docker.py
      - ../results:/results
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0', '1', '2', '3']
              capabilities: [gpu]

  rank1:
    image: gpu-comm-benchmark:latest
    container_name: exp2-baseline-rank1
    runtime: nvidia
    network_mode: host
    ipc: host
    pid: host
    environment:
      - NVIDIA_VISIBLE_DEVICES=0,1,2,3
      - CUDA_VISIBLE_DEVICES=1
      - NCCL_HOSTID=exp2-node
      - NCCL_DEBUG=INFO
      - NCCL_DEBUG_SUBSYS=INIT,P2P,SHM,NET
      - WORLD_SIZE=4
      - RANK=1
      - MASTER_ADDR=localhost
      - MASTER_PORT=29500
      - SMOKE_TEST=${SMOKE_TEST:-false}
    volumes:
      - ../benchmark.py:/workspace/benchmark.py
      - ../benchmark_docker.py:/workspace/benchmark_docker.py
    depends_on:
      - rank0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0', '1', '2', '3']
              capabilities: [gpu]

