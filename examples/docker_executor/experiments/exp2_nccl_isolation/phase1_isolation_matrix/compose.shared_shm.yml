# Config F: Shared SHM — 1 GPU per container + private IPC + bridge network + shared /dev/shm
# Hypothesis: NCCL SHM transport uses POSIX shared memory via /dev/shm.
#   By sharing a tmpfs volume at /dev/shm, containers can use SHM transport
#   without requiring ipc: host. Combined with shared /tmp for NCCL UDS.
# Isolation: IPC + Network (but /dev/shm and /tmp are shared volumes)

services:
  rank0:
    image: gpu-comm-benchmark:latest
    container_name: exp2-sshm-rank0
    runtime: nvidia
    # ipc: private (default)
    environment:
      - NVIDIA_VISIBLE_DEVICES=0
      - CUDA_VISIBLE_DEVICES=0
      - NCCL_HOSTID=exp2-node
      - NCCL_DEBUG=INFO
      - NCCL_DEBUG_SUBSYS=INIT,P2P,SHM,NET
      - WORLD_SIZE=4
      - RANK=0
      - MASTER_ADDR=rank0
      - MASTER_PORT=29500
      - OUTPUT_FILE=/results/shared_shm_results.json
      - SMOKE_TEST=${SMOKE_TEST:-false}
    volumes:
      - ../benchmark.py:/workspace/benchmark.py
      - ../benchmark_docker.py:/workspace/benchmark_docker.py
      - ../results:/results
      - shared-shm:/dev/shm
      - nccl-tmp:/tmp
    networks:
      - exp2-net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]

  rank1:
    image: gpu-comm-benchmark:latest
    container_name: exp2-sshm-rank1
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=1
      - CUDA_VISIBLE_DEVICES=0
      - NCCL_HOSTID=exp2-node
      - NCCL_DEBUG=INFO
      - NCCL_DEBUG_SUBSYS=INIT,P2P,SHM,NET
      - WORLD_SIZE=4
      - RANK=1
      - MASTER_ADDR=rank0
      - MASTER_PORT=29500
      - SMOKE_TEST=${SMOKE_TEST:-false}
    volumes:
      - ../benchmark.py:/workspace/benchmark.py
      - ../benchmark_docker.py:/workspace/benchmark_docker.py
      - shared-shm:/dev/shm
      - nccl-tmp:/tmp
    networks:
      - exp2-net
    depends_on:
      - rank0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['1']
              capabilities: [gpu]

  rank2:
    image: gpu-comm-benchmark:latest
    container_name: exp2-sshm-rank2
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=2
      - CUDA_VISIBLE_DEVICES=0
      - NCCL_HOSTID=exp2-node
      - NCCL_DEBUG=INFO
      - NCCL_DEBUG_SUBSYS=INIT,P2P,SHM,NET
      - WORLD_SIZE=4
      - RANK=2
      - MASTER_ADDR=rank0
      - MASTER_PORT=29500
      - SMOKE_TEST=${SMOKE_TEST:-false}
    volumes:
      - ../benchmark.py:/workspace/benchmark.py
      - ../benchmark_docker.py:/workspace/benchmark_docker.py
      - shared-shm:/dev/shm
      - nccl-tmp:/tmp
    networks:
      - exp2-net
    depends_on:
      - rank0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['2']
              capabilities: [gpu]

  rank3:
    image: gpu-comm-benchmark:latest
    container_name: exp2-sshm-rank3
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=3
      - CUDA_VISIBLE_DEVICES=0
      - NCCL_HOSTID=exp2-node
      - NCCL_DEBUG=INFO
      - NCCL_DEBUG_SUBSYS=INIT,P2P,SHM,NET
      - WORLD_SIZE=4
      - RANK=3
      - MASTER_ADDR=rank0
      - MASTER_PORT=29500
      - SMOKE_TEST=${SMOKE_TEST:-false}
    volumes:
      - ../benchmark.py:/workspace/benchmark.py
      - ../benchmark_docker.py:/workspace/benchmark_docker.py
      - shared-shm:/dev/shm
      - nccl-tmp:/tmp
    networks:
      - exp2-net
    depends_on:
      - rank0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['3']
              capabilities: [gpu]

networks:
  exp2-net:
    driver: bridge

volumes:
  shared-shm:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=2g
  nccl-tmp:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=200m
