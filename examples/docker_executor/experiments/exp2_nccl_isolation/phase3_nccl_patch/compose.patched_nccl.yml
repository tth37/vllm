# Phase 3: Patched NCCL — Test custom-built NCCL with per-GPU isolation
# Requires: building the nccl-dev image first with build_nccl.sh
# The patched NCCL is loaded via LD_PRELOAD, overriding PyTorch's bundled version.
# Isolation: IPC + Network (shared /dev/shm, /tmp, and signaling volume)

services:
  rank0:
    image: nccl-dev:latest
    container_name: exp2-patch-rank0
    runtime: nvidia
    # ipc: private (default)
    environment:
      - NVIDIA_VISIBLE_DEVICES=0,1,2,3
      - CUDA_VISIBLE_DEVICES=0
      - NCCL_HOSTID=exp2-node
      - NCCL_DEBUG=INFO
      - NCCL_DEBUG_SUBSYS=INIT,P2P,SHM,NET
      - LD_PRELOAD=/workspace/nccl/build/lib/libnccl.so.2
      - WORLD_SIZE=4
      - RANK=0
      - MASTER_ADDR=rank0
      - MASTER_PORT=29500
      - OUTPUT_FILE=/results/patched_nccl_results.json
      - SMOKE_TEST=${SMOKE_TEST:-false}
    volumes:
      - ../results:/results
      - shared-shm:/dev/shm
      - nccl-tmp:/tmp
      - nccl-signaling:/shared
    networks:
      - exp2-net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0', '1', '2', '3']
              capabilities: [gpu]

  rank1:
    image: nccl-dev:latest
    container_name: exp2-patch-rank1
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=0,1,2,3
      - CUDA_VISIBLE_DEVICES=1
      - NCCL_HOSTID=exp2-node
      - NCCL_DEBUG=INFO
      - NCCL_DEBUG_SUBSYS=INIT,P2P,SHM,NET
      - LD_PRELOAD=/workspace/nccl/build/lib/libnccl.so.2
      - WORLD_SIZE=4
      - RANK=1
      - MASTER_ADDR=rank0
      - MASTER_PORT=29500
      - SMOKE_TEST=${SMOKE_TEST:-false}
    volumes:
      - shared-shm:/dev/shm
      - nccl-tmp:/tmp
      - nccl-signaling:/shared
    networks:
      - exp2-net
    depends_on:
      - rank0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0', '1', '2', '3']
              capabilities: [gpu]

  rank2:
    image: nccl-dev:latest
    container_name: exp2-patch-rank2
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=0,1,2,3
      - CUDA_VISIBLE_DEVICES=2
      - NCCL_HOSTID=exp2-node
      - NCCL_DEBUG=INFO
      - NCCL_DEBUG_SUBSYS=INIT,P2P,SHM,NET
      - LD_PRELOAD=/workspace/nccl/build/lib/libnccl.so.2
      - WORLD_SIZE=4
      - RANK=2
      - MASTER_ADDR=rank0
      - MASTER_PORT=29500
      - SMOKE_TEST=${SMOKE_TEST:-false}
    volumes:
      - shared-shm:/dev/shm
      - nccl-tmp:/tmp
      - nccl-signaling:/shared
    networks:
      - exp2-net
    depends_on:
      - rank0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0', '1', '2', '3']
              capabilities: [gpu]

  rank3:
    image: nccl-dev:latest
    container_name: exp2-patch-rank3
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=0,1,2,3
      - CUDA_VISIBLE_DEVICES=3
      - NCCL_HOSTID=exp2-node
      - NCCL_DEBUG=INFO
      - NCCL_DEBUG_SUBSYS=INIT,P2P,SHM,NET
      - LD_PRELOAD=/workspace/nccl/build/lib/libnccl.so.2
      - WORLD_SIZE=4
      - RANK=3
      - MASTER_ADDR=rank0
      - MASTER_PORT=29500
      - SMOKE_TEST=${SMOKE_TEST:-false}
    volumes:
      - shared-shm:/dev/shm
      - nccl-tmp:/tmp
      - nccl-signaling:/shared
    networks:
      - exp2-net
    depends_on:
      - rank0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0', '1', '2', '3']
              capabilities: [gpu]

networks:
  exp2-net:
    driver: bridge

volumes:
  shared-shm:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=2g
  nccl-tmp:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=200m
  nccl-signaling:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=100m
