# SHM Workaround for node191: 2x A100-PCIe, NODE topology
# Per-GPU CUDA isolation + shared /dev/shm + NCCL SHM transport
#
# Baseline (no isolation) uses SHM/direct/direct on this machine.
# This config replicates the same transport with per-GPU container isolation.

services:
  rank0:
    image: gpu-comm-benchmark:latest
    container_name: exp2-node191-shmwa-rank0
    environment:
      - NVIDIA_VISIBLE_DEVICES=0,1
      - CUDA_VISIBLE_DEVICES=0
      - NCCL_HOSTID=exp2-node191
      - NCCL_DEBUG=INFO
      - NCCL_DEBUG_SUBSYS=INIT,P2P,SHM,NET
      - NCCL_NET_DISABLE_INTRA=1
      - NCCL_P2P_DISABLE=1
      - NCCL_SHM_DISABLE=0
      - WORLD_SIZE=2
      - RANK=0
      - MASTER_ADDR=rank0
      - MASTER_PORT=29500
      - OUTPUT_FILE=/results/node191_isolated_shm.json
      - SMOKE_TEST=${SMOKE_TEST:-false}
    volumes:
      - ../benchmark.py:/workspace/benchmark.py
      - ../benchmark_docker.py:/workspace/benchmark_docker.py
      - ../results:/results
      - shared-shm:/dev/shm
      - nccl-tmp:/tmp
    networks:
      - exp2-net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0', '1']
              capabilities: [gpu]

  rank1:
    image: gpu-comm-benchmark:latest
    container_name: exp2-node191-shmwa-rank1
    environment:
      - NVIDIA_VISIBLE_DEVICES=0,1
      - CUDA_VISIBLE_DEVICES=1
      - NCCL_HOSTID=exp2-node191
      - NCCL_DEBUG=INFO
      - NCCL_DEBUG_SUBSYS=INIT,P2P,SHM,NET
      - NCCL_NET_DISABLE_INTRA=1
      - NCCL_P2P_DISABLE=1
      - NCCL_SHM_DISABLE=0
      - WORLD_SIZE=2
      - RANK=1
      - MASTER_ADDR=rank0
      - MASTER_PORT=29500
      - SMOKE_TEST=${SMOKE_TEST:-false}
    volumes:
      - ../benchmark.py:/workspace/benchmark.py
      - ../benchmark_docker.py:/workspace/benchmark_docker.py
      - shared-shm:/dev/shm
      - nccl-tmp:/tmp
    networks:
      - exp2-net
    depends_on:
      - rank0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0', '1']
              capabilities: [gpu]

networks:
  exp2-net:
    driver: bridge

volumes:
  shared-shm:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=4g
  nccl-tmp:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=200m
